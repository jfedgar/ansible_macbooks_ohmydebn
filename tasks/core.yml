---
- name: Install Fundamental Binaries
  become: true
  apt:
    name: [curl, git, wget, gpg, brightnessctl, x11-utils]
    state: present
    update_cache: yes

- name: Install ohmydebn (The Official Curl Method)
  shell: |
    curl -s https://raw.githubusercontent.com/crawfoo/ohmydebn/main/install.sh | bash -s -- --yes
  args:
    # This prevents it from re-running if the config directory already exists
    creates: "{{ ansible_env.HOME }}/.config/ohmydebn"

- name: Core Keyboard Remap (Caps to Escape) - Cinnamon dconf
  become: false
  dconf:
    key: "{{ item }}"
    value: "['caps:escape']"
  loop:
    - "/org/cinnamon/desktop/input-sources/xkb-options"
    - "/org/cinnamon/desktop/input/keyboard/xkb-options"

- name: Core Keyboard Remap (Caps to Escape) - setxkbmap autostart fallback
  copy:
    dest: "{{ ansible_env.HOME }}/.config/autostart/caps-to-escape.desktop"
    content: |
      [Desktop Entry]
      Type=Application
      Exec=setxkbmap -option caps:escape
      Name=Caps Lock to Escape
      X-GNOME-Autostart-enabled=true

- name: Persist and Restore Brightness Across Reboots
  block:
    - name: Ensure ~/.local/bin and brightness state dirs exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ ansible_env.HOME }}/.local/bin"
        - "{{ ansible_env.HOME }}/.config/brightness-state"
        - "{{ ansible_env.HOME }}/.config/systemd/user"

    - name: Remove old max-brightness autostart
      file:
        path: "{{ ansible_env.HOME }}/.config/autostart/max-brightness.desktop"
        state: absent

    - name: Create restore-brightness script
      copy:
        dest: "{{ ansible_env.HOME }}/.local/bin/restore-brightness"
        mode: '0755'
        content: |
          #!/bin/sh
          sleep 2
          if [ -f "$HOME/.config/brightness-state/monitor" ]; then
              brightnessctl set "$(cat "$HOME/.config/brightness-state/monitor")" 2>/dev/null || true
          fi
          if [ -f "$HOME/.config/brightness-state/kbd" ]; then
              brightnessctl --device='apple::kbd_backlight' set "$(cat "$HOME/.config/brightness-state/kbd")" 2>/dev/null || true
          fi

    - name: Restore brightness on login (autostart)
      copy:
        dest: "{{ ansible_env.HOME }}/.config/autostart/restore-brightness.desktop"
        content: |
          [Desktop Entry]
          Type=Application
          Exec={{ ansible_env.HOME }}/.local/bin/restore-brightness
          Name=Restore Brightness
          X-GNOME-Autostart-enabled=true

    - name: Save brightness on logout (systemd user service)
      copy:
        dest: "{{ ansible_env.HOME }}/.config/systemd/user/save-brightness.service"
        content: |
          [Unit]
          Description=Save brightness on logout

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStop=sh -c 'brightnessctl get > %h/.config/brightness-state/monitor && brightnessctl --device=apple::kbd_backlight get > %h/.config/brightness-state/kbd'

          [Install]
          WantedBy=default.target

    - name: Enable and start save-brightness service
      systemd:
        name: save-brightness
        scope: user
        state: started
        enabled: yes
        daemon_reload: yes
      ignore_errors: yes

- name: Install Brave Browser
  become: true
  block:
    - name: Add Brave Repo & Key
      shell: |
        curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main" > /etc/apt/sources.list.d/brave-browser-release.list
    - name: Install Brave
      apt: { name: brave-browser, update_cache: yes, state: present }

- name: Register and Set System Default Browser
  become: true
  shell: |
    update-alternatives --install /usr/bin/x-www-browser x-www-browser /usr/bin/brave-browser 100
    update-alternatives --set x-www-browser /usr/bin/brave-browser

- name: Set User Default Browser
  shell: xdg-settings set default-web-browser brave-browser.desktop
  # Run this as the user, NOT root
  become: false
