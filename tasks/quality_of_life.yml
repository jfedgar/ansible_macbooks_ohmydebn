---
- name: Install binary dependencies
  become: true
  apt:
    name: [xdotool, wmctrl, libinput-tools, git, x11-utils]
    state: present
    
- name: Check if libinput-gestures is installed
  stat:
    path: /usr/bin/libinput-gestures
  register: libinput_gestures_check

- name: Clone and Install libinput-gestures
  when: not libinput_gestures_check.stat.exists
  block:
    - name: Clone libinput-gestures repo
      git:
        repo: 'https://github.com/bulletmark/libinput-gestures.git'
        dest: /tmp/libinput-gestures
        depth: 1
    - name: Install libinput-gestures
      become: true
      shell: ./libinput-gestures-setup install
      args:
        chdir: /tmp/libinput-gestures

- name: Configure libinput-gestures
  block:
    - name: Add user to input group
      become: true
      user: { name: "{{ ansible_user_id }}", groups: input, append: yes }
    - name: Write gesture config
      copy:
        dest: "~/.config/libinput-gestures.conf"
        content: |
          gesture swipe left 3 xdotool key ctrl+alt+Right
          gesture swipe right 3 xdotool key ctrl+alt+Left
          gesture swipe up 3 xdotool key ctrl+alt+Up
          gesture swipe down 3 xdotool key ctrl+alt+Down

- name: Workspace Shuffle (Super+Shift+Num)
  dconf:
    key: "/org/cinnamon/desktop/keybindings/wm/move-to-workspace-{{ item }}"
    value: "['<Super><Shift>{{ item }}']"
  loop: "{{ range(1, 10) | list }}"

- name: UI Essentials (Fullscreen, File Manager, Screenshot, Bounce Keys)
  dconf:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - { key: "/org/cinnamon/desktop/keybindings/wm/toggle-fullscreen", value: "['<Super>f']" }
    - { key: "/org/cinnamon/desktop/keybindings/media-keys/home", value: "['<Super><Shift>f']" }
    - { key: "/org/cinnamon/desktop/keybindings/media-keys/area-screenshot", value: "['<Super><Shift>e']" }
    - { key: "/org/cinnamon/muffin/overlay-key", value: "''" }
    - { key: "/org/cinnamon/desktop/a11y/keyboard/bouncekeys-enable", value: "true" }
    - { key: "/org/cinnamon/desktop/a11y/keyboard/bouncekeys-delay", value: "40" }
    - { key: "/org/cinnamon/desktop/wm/preferences/focus-mode", value: "'sloppy'" }

- name: Update Custom Keybindings
  dconf:
    key: "/org/cinnamon/desktop/keybindings/custom-keybindings/{{ item.id }}/{{ item.prop }}"
    value: "{{ item.val }}"
  loop:
    - { id: "custom-0", prop: "name", val: "'Default Browser'" }
    - { id: "custom-0", prop: "command", val: "'xdg-open https://www.google.com'" }
    - { id: "custom-0", prop: "binding", val: "['<Super>b']" }
    - { id: "custom-7", prop: "name", val: "'btop'" }
    - { id: "custom-7", prop: "command", val: "'alacritty -e btop'" }
    - { id: "custom-7", prop: "binding", val: "['<Super>i']" }
    # Super+T -> Browser New Tab
    - { id: "custom-41", prop: "name", val: "'Browser New Tab'" }
    - { id: "custom-41", prop: "command", val: "'sh -c \"xdotool keyup Super_L Super_R; sleep 0.1; xdotool key ctrl+t\"'" }
    - { id: "custom-41", prop: "binding", val: "['<Super>t']" }
    # Super+R -> Browser Reload
    - { id: "custom-42", prop: "name", val: "'Browser Reload'" }
    - { id: "custom-42", prop: "command", val: "'sh -c \"xdotool keyup Super_L Super_R; sleep 0.1; xdotool key ctrl+r\"'" }
    - { id: "custom-42", prop: "binding", val: "['<Super>r']" }

- name: Strip Super+R from Rofi
  dconf:
    key: "/org/cinnamon/desktop/keybindings/custom-keybindings/custom-6/binding"
    value: "['<Super>space']"

- name: Disable Specific Conflicting ohmydebn Shortcuts
  dconf:
    key: "/org/cinnamon/desktop/keybindings/custom-keybindings/custom-{{ item }}/binding"
    value: "['']"
  loop: []  # custom-8 (Super+X) and custom-18 (Super+A) are repurposed for clipboard below

- name: Finalize Custom List
  dconf:
    key: "/org/cinnamon/desktop/keybindings/custom-list"
    value: >-
      ['custom-0', 'custom-1', 'custom-2', 'custom-3', 'custom-4',
      'custom-5', 'custom-6', 'custom-7', 'custom-8', 'custom-9',
      'custom-10', 'custom-11', 'custom-12', 'custom-13', 'custom-14',
      'custom-15', 'custom-16', 'custom-17', 'custom-18', 'custom-19',
      'custom-20', 'custom-21', 'custom-22', 'custom-23', 'custom-24',
      'custom-25', 'custom-26', 'custom-27', 'custom-28', 'custom-29',
      'custom-30', 'custom-31', 'custom-32', 'custom-33', 'custom-34',
      'custom-35', 'custom-36', 'custom-37', 'custom-38', 'custom-39',
      'custom-40', 'custom-41', 'custom-42', 'custom-43']

- name: Start Gestures Service
  shell: |
    libinput-gestures-setup autostart
    libinput-gestures-setup start
  ignore_errors: yes

- name: Smart Universal Clipboard & Selection (Alacritty-Safe)
  become: false # NEVER run dconf as root
  dconf:
    key: "/org/cinnamon/desktop/keybindings/custom-keybindings/{{ item.id }}/{{ item.prop }}"
    value: "{{ item.val }}"
  loop:
    # Super+C: Copy — custom-1 (was Calendar/Super+C, same key so repurposed cleanly)
    - { id: "custom-1", prop: "name", val: "'Smart Copy'" }
    - { id: "custom-1", prop: "command", val: "'sh -c \"WIN=$(xdotool getactivewindow); xdotool keyup Super_L Super_R; sleep 0.1; if xprop -id $WIN WM_CLASS | grep -qi alacritty; then xdotool key ctrl+shift+c; else xdotool key ctrl+c; fi\"'" }
    - { id: "custom-1", prop: "binding", val: "['<Super>c']" }

    # Super+V: Paste — custom-30 (was VirtMan/Super+V, same key so repurposed cleanly)
    - { id: "custom-30", prop: "name", val: "'Smart Paste'" }
    - { id: "custom-30", prop: "command", val: "'sh -c \"WIN=$(xdotool getactivewindow); xdotool keyup Super_L Super_R; sleep 0.1; if xprop -id $WIN WM_CLASS | grep -qi alacritty; then xdotool key ctrl+shift+v; else xdotool key ctrl+v; fi\"'" }
    - { id: "custom-30", prop: "binding", val: "['<Super>v']" }

    # Super+X: Cut — custom-8 (was X.com/Super+X, same key so repurposed cleanly)
    - { id: "custom-8", prop: "name", val: "'Smart Cut'" }
    - { id: "custom-8", prop: "command", val: "'sh -c \"WIN=$(xdotool getactivewindow); xdotool keyup Super_L Super_R; sleep 0.1; if xprop -id $WIN WM_CLASS | grep -qi alacritty; then xdotool key ctrl+shift+x; else xdotool key ctrl+x; fi\"'" }
    - { id: "custom-8", prop: "binding", val: "['<Super>x']" }

    # Super+A: Select All — custom-18 (was OpenCode/Super+A, same key so repurposed cleanly)
    - { id: "custom-18", prop: "name", val: "'Smart Select All'" }
    - { id: "custom-18", prop: "command", val: "'sh -c \"WIN=$(xdotool getactivewindow); xdotool keyup Super_L Super_R; sleep 0.1; if xprop -id $WIN WM_CLASS | grep -qi alacritty; then true; else xdotool key ctrl+a; fi\"'" }
    - { id: "custom-18", prop: "binding", val: "['<Super>a']" }

    # Super+Z: Undo — custom-43 (no-op in alacritty to avoid SIGTSTP/suspend)
    - { id: "custom-43", prop: "name", val: "'Smart Undo'" }
    - { id: "custom-43", prop: "command", val: "'sh -c \"WIN=$(xdotool getactivewindow); xdotool keyup Super_L Super_R; sleep 0.1; if xprop -id $WIN WM_CLASS | grep -qi alacritty; then true; else xdotool key ctrl+z; fi\"'" }
    - { id: "custom-43", prop: "binding", val: "['<Super>z']" }

# ---------------------------------------------------------------------------
# HiDPI Console Font (Retina MacBooks — unreadable without this)
# ---------------------------------------------------------------------------

- name: Configure large console font for HiDPI displays
  become: true
  lineinfile:
    path: /etc/default/console-setup
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^FONTFACE=', line: 'FONTFACE="Terminus"' }
    - { regexp: '^FONTSIZE=', line: 'FONTSIZE="16x32"' }
  when: ansible_product_name is match("MacBookPro.*")
  notify: rebuild console font

- name: Set GRUB framebuffer resolution for HiDPI
  become: true
  lineinfile:
    path: /etc/default/grub
    regexp: '^#?GRUB_GFXMODE='
    line: 'GRUB_GFXMODE=1024x768'
  when: ansible_product_name is match("MacBookPro.*")
  notify: update grub

# ---------------------------------------------------------------------------
# Autologin (LightDM + Cinnamon)
# ---------------------------------------------------------------------------

- name: Ensure autologin group exists
  become: true
  group:
    name: autologin
    system: true
    state: present

- name: Add user to autologin group
  become: true
  user:
    name: "{{ ansible_user_id }}"
    groups: autologin
    append: true

- name: Configure LightDM autologin
  become: true
  blockinfile:
    path: /etc/lightdm/lightdm.conf
    marker: "# {mark} ANSIBLE MANAGED - autologin"
    block: |
      autologin-user={{ ansible_user_id }}
      autologin-user-timeout=0
      autologin-session=cinnamon
    insertafter: '^\[Seat:\*\]'
    create: false
  notify: restart lightdm

- name: Ensure lightdm-autologin PAM allows autologin group
  become: true
  lineinfile:
    path: /etc/pam.d/lightdm-autologin
    regexp: '^auth\s+required\s+pam_succeed_if.so'
    line: 'auth    required    pam_succeed_if.so user ingroup autologin'
    state: present
