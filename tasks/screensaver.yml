---
# ---------------------------------------------------------------------------
# Terminal Text Effects Screensaver
# Adapted from Omarchy by DHH (https://omarchy.com / https://github.com/basecamp/omarchy)
# Original scripts: omarchy-cmd-screensaver and omarchy-launch-screensaver
# Modified for ohmydebn (Cinnamon/X11) — replaced hyprctl with xdotool/xprop,
# adapted tte flags for v0.12.0, and uses inline alacritty config
#
# Architecture: A Python daemon polls xprintidle and launches a fullscreen
# Alacritty/TTE screensaver at idle-delay. csd-power will also activate
# cinnamon-screensaver at the same time — the daemon actively suppresses
# this via cinnamon-screensaver-command -d so TTE stays visible.
# Security relies on lock-on-suspend: the user sets suspend timeout = desired
# screensaver duration. When suspend fires, cinnamon locks automatically.
# Manual lock (Ctrl+Alt+L) still works — the daemon doesn't interfere.
# ---------------------------------------------------------------------------

- name: Ensure screensaver dependencies are installed
  become: true
  apt:
    name:
      - python3-terminaltexteffects
      - python3-dbus
      - python3-gi
      - xprintidle
    state: present

- name: Remove legacy screensaver components
  become: true
  apt:
    name: xss-lock
    state: absent

- name: Install screensaver branding text
  copy:
    src: "{{ playbook_dir }}/files/screensaver.txt"
    dest: "{{ ansible_env.HOME }}/.config/ohmydebn/branding/screensaver.txt"
    mode: '0644'

- name: Install screensaver command script
  copy:
    src: "{{ playbook_dir }}/files/ohmydebn-cmd-screensaver"
    dest: "{{ ansible_env.HOME }}/.local/bin/ohmydebn-cmd-screensaver"
    mode: "0755"

- name: Install screensaver orchestration daemon
  copy:
    src: "{{ playbook_dir }}/files/ohmydebn-screensaver-daemon.py"
    dest: "{{ ansible_env.HOME }}/.local/bin/ohmydebn-screensaver-daemon"
    mode: "0755"

- name: Remove outdated launch script
  file:
    path: "{{ ansible_env.HOME }}/.local/bin/ohmydebn-launch-screensaver"
    state: absent

# ---------------------------------------------------------------------------
# Idle activation — cinnamon-screensaver stays alive for manual lock, lid-close,
# and lock-on-suspend. idle-activation-enabled is set to false as a signal of
# intent, though csd-power ignores it (the daemon handles suppression instead).
# custom-screensaver-command MUST stay empty — setting it kills the entire
# cinnamon-screensaver daemon (no D-Bus, no locking, no lock-on-suspend).
# ---------------------------------------------------------------------------

- name: Disable Cinnamon screensaver idle activation
  dconf:
    key: "/org/cinnamon/desktop/screensaver/idle-activation-enabled"
    value: "false"

- name: Ensure custom-screensaver-command is unset (setting it kills cinnamon-screensaver entirely)
  dconf:
    key: "/org/cinnamon/desktop/screensaver/custom-screensaver-command"
    value: "''"

- name: Ensure lock-on-suspend is enabled (security relies on this)
  dconf:
    key: "/org/cinnamon/settings-daemon/plugins/power/lock-on-suspend"
    value: "true"

- name: Install screensaver idle autostart
  copy:
    dest: "{{ ansible_env.HOME }}/.config/autostart/ohmydebn-screensaver.desktop"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=OhMyDebn Screensaver
      Exec={{ ansible_env.HOME }}/.local/bin/ohmydebn-screensaver-daemon
      Hidden=false
      X-GNOME-Autostart-enabled=true
      Comment=TTE screensaver daemon — suppresses cinnamon-screensaver during TTE playback
